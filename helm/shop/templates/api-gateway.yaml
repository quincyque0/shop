apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: {{ .Values.apiGateway.replicas }}
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: "{{ .Values.apiGateway.image }}:{{ .Values.apiGateway.tag }}"
          ports:
            - containerPort: {{ .Values.apiGateway.port }}
          env:
            - name: CATALOG_URL
              value: "http://catalog-svc:{{ .Values.catalogSvc.port }}"
            - name: ORDER_URL
              value: "http://order-svc:{{ .Values.orderSvc.port }}"
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.apiGateway.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: {{ .Values.apiGateway.serviceType }}
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: {{ .Values.apiGateway.port }}
