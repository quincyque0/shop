version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shop_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d shop_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 10s
      retries: 5

  api-gateway:
    build:
      context: ./api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - catalog-svc
      - order-svc

  catalog-svc:
    build:
      context: ./catalog-svc
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres:5432/shop_db
    depends_on:
      postgres:
        condition: service_healthy

  order-svc:
    build:
      context: ./order-svc
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres:5432/shop_db
      - RABBITMQ_URL=amqp://user:password@rabbitmq:5672/
      - CATALOG_GRPC_URL=catalog-svc:50051
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-svc:
    build:
      context: ./notification-svc
    environment:
      - RABBITMQ_URL=amqp://user:password@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
